spring.application.name=API-GATEWAY
server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
jwt.secret=${SECRET_KEY}

spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=question-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://QUESTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/question/**

spring.cloud.gateway.server.webmvc.routes[2].id=quiz-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/quiz/**

management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true